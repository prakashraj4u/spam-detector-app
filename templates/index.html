<head>
    <meta charset="UTF-8">
    <title>Spam Detector</title>

    <!-- ✅ This is how you link CSS in Flask -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<div class="divider"><hr><span>OR</span><hr></div>

<div class="lbl">Check a suspicious link</div>
<form action="/predict" method="POST">
    <input type="url" name="url" placeholder="https://suspicious-link.com" 
           style="width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,100,100,0.3); border-radius:12px; padding:14px; font-size:14px; color:#c8c8f0; outline:none; font-family:'Rajdhani',sans-serif;">
    <button type="submit" class="btn-url">🔗 SCAN LINK</button>
</form>

{% if url_result %}
    {% if url_result.status == "DANGEROUS" %}
        <div class="result-spam">{{ url_result.message }}</div>
    {% elif url_result.status == "SAFE" %}
        <div class="result-safe">{{ url_result.message }}</div>
    {% else %}
        <div class="result-warn">{{ url_result.message }}</div>
    {% endif %}
{% endif %}
